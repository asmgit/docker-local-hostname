name: project_mono

# Identical internal ports to project_admin (web :80, db :5432) — they do not
# conflict because nothing is published to the host; each name resolves to its
# own container IP. Reached as http://project_mono.ldev and db.project_mono.ldev:5432
services:
  web:
    image: traefik/whoami
    hostname: project_mono.ldev

  db:
    image: postgres:18-alpine
    hostname: db.project_mono.ldev
    environment:
      POSTGRES_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/postgresql

volumes:
  dbdata:
